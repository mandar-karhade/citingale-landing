name: Refresh Medium blog

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-medium-blog:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Medium posts
        run: npm run sync:medium

      - name: Test Medium parser
        run: npm run test:medium

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./out --project-name=citingale-landing --branch=main
